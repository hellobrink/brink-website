name: Claude

# Lets anyone with repo access tag @claude on an issue or PR comment and
# have it do the work in a pull request. This is the team-facing CMS/dev
# surface: file an issue ("upload this blog post", "fix the hero on
# /health"), tag @claude, review the PR it opens.
#
# Requires:
#   1. The Claude GitHub App installed on this repo (https://github.com/apps/claude)
#   2. An ANTHROPIC_API_KEY repository secret
# See CLAUDE.md for project context — the action reads it automatically.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Only spend a run when a human actually asks for Claude. The Bot
    # check stops Claude's own progress comments re-triggering the
    # workflow (harmless, but it queues a skipped run every time).
    if: |
      github.event.sender.type != 'Bot' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Pre-install so Claude can run `npm run build` / `npm run audit`
      # without spending turns on dependency installation.
      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # --model must be pinned: left unset, the action resolved to
          # "claude-opus-4-8[1m]" (a Claude Code session alias, not a valid
          # API model id) and the API rejected every call instantly.
          #
          # Bash is allowed broadly rather than command-by-command. A tight
          # per-command allowlist caused repeated permission denials (it
          # couldn't run `npm run scrape` or `git diff`), which burned turns
          # improvising around the blocks until it hit the cap. The action
          # only responds to actors with repo write access on an ephemeral
          # runner, so a per-command allowlist buys little here.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 60
            --allowedTools "Bash"
